<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Connexion — Jleray-Relay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent:#6c63ff; --accent3:#00d9ff; --bg:#0a0a0f; --card:#16213e; --border:#2a2a4a; --text:#e8e8f0; --muted:#8888aa; --danger:#ff5252; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    body::before {
      content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
      background:
        radial-gradient(ellipse at 30% 30%, rgba(108,99,255,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 75%, rgba(0,217,255,0.08) 0%, transparent 55%);
      pointer-events:none;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
      position: relative; z-index:1;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .logo {
      font-size:1.5rem; font-weight:800; text-align:center; margin-bottom:0.4rem;
      background:linear-gradient(135deg,var(--accent),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .subtitle { text-align:center; color:var(--muted); font-size:0.85rem; margin-bottom:2rem; }
    .form-group { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.2rem; }
    label { font-size:0.82rem; font-weight:500; color:var(--muted); }
    input {
      background:#12121a; border:1px solid var(--border); border-radius:12px;
      padding:0.75rem 1rem; color:var(--text); font-family:inherit; font-size:0.9rem;
      width:100%; outline:none; transition:border-color 0.25s, box-shadow 0.25s;
    }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,0.18); }
    .btn {
      width:100%; padding:0.8rem; border-radius:12px; border:none;
      background:linear-gradient(135deg,var(--accent),#9c63ff);
      color:white; font-size:0.95rem; font-weight:700; font-family:inherit;
      cursor:pointer; transition:all 0.25s;
      box-shadow:0 4px 20px rgba(108,99,255,0.35);
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(108,99,255,0.55); }
    .btn:active { transform:translateY(0); }
    .error {
      background:rgba(255,82,82,0.1); color:var(--danger);
      border:1px solid rgba(255,82,82,0.3); border-radius:10px;
      padding:0.7rem 1rem; font-size:0.85rem; margin-bottom:1rem;
      display:flex; align-items:center; gap:0.5rem;
      animation:shake 0.4s ease;
    }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .version { text-align:center; color:var(--muted); font-size:0.72rem; margin-top:1.5rem; opacity:0.6; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">🔀 Jleray-Relay</div>
    <p class="subtitle">Panneau d’administration</p>
    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autofocus />
      </div>
      <button type="submit" class="btn">Se connecter →</button>
    </form>
    <p class="version">Jleray-Relay v1.0 — édition Pterodactyl</p>
  </div>
</body>
</html>
