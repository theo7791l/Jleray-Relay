<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Jleray-Relay{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a2e;
      --card: #16213e;
      --border: #2a2a4a;
      --accent: #6c63ff;
      --accent2: #ff6b9d;
      --accent3: #00d9ff;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --success: #00e676;
      --danger: #ff5252;
      --warning: #ffd740;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.07) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(0,217,255,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .logo span { color: var(--accent2); -webkit-text-fill-color: var(--accent2); }
    .nav-links { display: flex; gap: 0.5rem; align-items: center; }
    .nav-link {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-link:hover { background: var(--bg3); color: var(--text); }
    .nav-link.active { background: rgba(108,99,255,0.15); color: var(--accent); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.25s;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9c63ff);
      color: white;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(108,99,255,0.5); }
    .btn-danger { background: rgba(255,82,82,0.15); color: var(--danger); border: 1px solid rgba(255,82,82,0.3); }
    .btn-danger:hover { background: rgba(255,82,82,0.25); transform: translateY(-1px); }
    .btn-ghost { background: var(--bg3); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; position: relative; z-index: 1; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      transition: border-color 0.3s;
    }
    .card:hover { border-color: rgba(108,99,255,0.3); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-active { background: rgba(0,230,118,0.15); color: var(--success); border: 1px solid rgba(0,230,118,0.3); }
    .badge-inactive { background: rgba(255,82,82,0.12); color: var(--danger); border: 1px solid rgba(255,82,82,0.25); }
    input, select, textarea {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }
    .alert {
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .alert-error { background: rgba(255,82,82,0.12); color: var(--danger); border: 1px solid rgba(255,82,82,0.3); }
    .alert-success { background: rgba(0,230,118,0.1); color: var(--success); border: 1px solid rgba(0,230,118,0.3); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-in { animation: fadeIn 0.4s ease both; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/admin/dashboard" class="logo">🔀 Jleray<span>-Relay</span></a>
    <div class="nav-links">
      <a href="/admin/dashboard" class="nav-link {% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/admin/profile" class="nav-link {% if active == 'profile' %}active{% endif %}">Profil</a>
      <a href="/admin/logout" class="nav-link">Déconnexion</a>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
